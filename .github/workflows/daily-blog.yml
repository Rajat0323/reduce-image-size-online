name: Daily SEO Blog (10 AM IST)

on:
  schedule:
    # 10:00 AM India Standard Time (UTC+5:30)
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-daily-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily SEO blog (2600+ words, FAQ schema)
        run: npm run blog:daily

      - name: Verify build
        run: npm run build

      - name: Commit and push to main
        run: |
          git config user.name "cursor-blog-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily blog: $(date -u +%Y-%m-%d) — auto SEO publish"
          git push origin main
